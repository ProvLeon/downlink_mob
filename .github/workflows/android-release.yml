name: Android Release Build

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build APK via EAS Cloud
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: |
          cd downlink_app
          bun install

      - name: 🚀 Trigger EAS Build
        id: build
        run: |
          cd downlink_app
          # We trigger the build and extract the artifact URL or wait for it.
          # Since --output is local only, we use eas build and then download.
          BUILD_DETAILS=$(eas build --platform android --profile apk --non-interactive --no-wait --json)
          BUILD_ID=$(echo $BUILD_DETAILS | jq -r '.[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: ⏳ Wait for Build and Download
        run: |
          cd downlink_app
          # Wait for the specific build to complete and download the artifact
          eas build:view ${{ steps.build.outputs.build_id }} --json > build_info.json
          # Note: In a real CI environment, we'd loop or use --wait if it supported redirection.
          # Better approach: trigger build with --wait, then use eas build:list or similar.
          # Correcting to the standard reliable way:
          eas build --platform android --profile apk --non-interactive --wait

          # Now fetch the actual download URL for the latest completed build of this profile
          DOWNLOAD_URL=$(eas build:list --platform android --profile apk --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          curl -L $DOWNLOAD_URL -o ./downlink-android.apk

      - name: 📤 Upload Artifact to GitHub Action
        uses: actions/upload-artifact@v4
        with:
          name: downlink-apk
          path: downlink_app/downlink-android.apk

      - name: 🚀 Attach APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: downlink_app/downlink-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
